<style>
:root { --maxw: 62rem; --pass: #2d6a3f; --pass-bg: #edf7f0; --fail: #8a2c2c; --fail-bg: #fdf2f2; }

/* conventions */

@media(max-width:640px){ .conv-grid { grid-template-columns:1fr; } }

/* category nav */
.cat-nav { display:flex; flex-wrap:wrap; gap:.4rem; margin:1.2rem 0 1rem; }
.cat-btn {
  cursor:pointer; border:1px solid var(--rule); border-radius:999px;
  background:#f3f1ec; color:#555; font-size:.78rem; font-weight:600;
  padding:.28em .75em; transition:background .12s, color .12s;
}
.cat-btn:hover { background:#e6e3dd; }
.cat-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* requirement cards */
.req-group { margin-top:1.8rem; }
.req-group-heading {
  font-size:.72rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color:var(--muted); border-bottom:1px solid var(--rule); padding-bottom:.3rem;
  margin-bottom:.7rem;
}
.req-card { border:1px solid var(--rule); border-radius:8px; background:#fff; margin:.75rem 0; overflow:hidden; }
.req-card-header { display:flex; align-items:baseline; gap:.65rem; padding:.6rem .85rem .4rem; }
.req-id { font-family:ui-monospace,Menlo,monospace; font-size:.74rem; background:#eae8e3; padding:.12em .5em; border-radius:4px; white-space:nowrap; flex-shrink:0; }
.req-title { font-weight:650; font-size:.95rem; }
.req-command { font-family:ui-monospace,Menlo,monospace; font-size:.78rem; background:#f5f4f1; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); padding:.45rem .85rem; white-space:pre-wrap; word-break:break-all; }
.req-sections { padding:.5rem .85rem .65rem; display:grid; gap:.5rem; }
.req-section-label { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.2rem; }
.req-section ul { margin:.2rem 0; padding-left:1.3rem; }
.req-section li { font-size:.86rem; margin:.18rem 0; }
.label-pre { color:var(--muted); }
.label-pass { color:var(--pass); }
.label-fail { color:var(--fail); }
.pass-item { color:#2a5c38; }
.fail-item { color:#7a2828; }

.hidden { display:none !important; }

<script>
const DATA = {
  "tool": "norm",
  "spec_version": "0.3.0",
  "platform": "macOS (Apple Silicon), macOS 12+",
  "description": "Pass/fail requirements for the norm CLI: a local, encrypted screen+AX recorder with in-process Gemma-4 (mlx-vlm) reporting. Each requirement is a black-box test on CLI behavior: invocation, I/O, side effects, and exit code.",
  "conventions": {
    "prerequisites": [
      "macOS 12+ on Apple Silicon",
      "norm runs non-sandboxed (required to read other apps' AX trees)",
      "macOS Accessibility and Screen Recording permissions granted to the norm/host binary",
      "Python runtime with macapptree (capture), mlx-vlm (inference), imagehash (dedupe), SQLCipher + AES-256-GCM (storage)"
    ],
    "exit_codes": {
      "0": "success",
      "1": "runtime_error (unexpected failure during a valid operation)",
      "2": "usage_error (unknown command/subcommand, missing/invalid argument)",
      "3": "auth_error (store locked, wrong passphrase, missing/denied Keychain key)",
      "4": "model_error (MLX weights unavailable offline, invalid model_ref, or inference failure)",
      "5": "not_found (no captures/preprocess output/record id in range)",
      "6": "environment_error (missing macOS Accessibility or Screen Recording permission, macapptree unavailable)"
    },
    "inference": {
      "library": "mlx-vlm",
      "mode": "in-process",
      "server": "none (no daemon, no socket, no HTTP endpoint started or contacted)",
      "model_ref": "MLX repo id or local path",
      "weights_cache": "~/.cache/huggingface (first load downloads; later loads are local)",
      "call_pattern": "load(model_ref) -> apply_chat_template(...) -> generate(model, processor, prompt, image=[...])",
      "modalities": "text + image; decrypted frames passed as in-memory PIL images"
    },
    "config": {
      "path": "~/.norm",
      "format": "TOML",
      "precedence": "explicit CLI flag > ~/.norm value > built-in default",
      "keys": ["interval_minutes","idle_threshold_seconds","data_dir","phash_threshold","model","window_k","stride_j","max_tokens","prompt_preprocess","prompt_interval"]
    },
    "defaults": {
      "interval_minutes": 5,
      "idle_threshold_seconds": 300,
      "data_dir": "~/Library/Application Support/norm",
      "phash_threshold": 4,
      "model": "mlx-community/gemma-4-e4b-it-4bit",
      "window_k": 6,
      "stride_j": 3,
      "max_tokens": 512,
      "prompt_preprocess": "What was this user doing?",
      "prompt_interval": "What did the user do over the time interval?"
    },
    "encryption": {
      "index": "SQLCipher (AES-256)",
      "blobs": "AES-256-GCM",
      "key_custody": "random 256-bit data key in macOS Keychain (norm-scoped ACL), optionally wrapped by a norm passphrase via Argon2id",
      "login_password_used": false,
      "elevated_privileges_used": false
    },
    "time_args": {
      "from": "--from accepts ISO-8601 or relative (e.g. '-24h', 'yesterday'); resolved in local tz",
      "to": "--to accepts ISO-8601, relative (e.g. '-1h'), or 'now'; defaults to 'now' when only --from is given",
      "last": "--last accepts a duration like '24h', '7d'; mutually exclusive with --from/--to (else exit 2)",
      "defaults": "list & report preprocess: omitting all range flags = all captures. report interval requires a range (else exit 2). All relative/now values resolve against one command-start timestamp."
    },
    "global_flags": ["--help/-h","--version","--config <path>","--json","--verbose/-v","--quiet/-q"],
    "uninitialized": "Store commands on a never-initialized machine exit 5 (NOT_INITIALIZED), distinct from a present-but-locked store (exit 3, STORE_LOCKED). config get/set require ~/.norm. status always exits 0, reporting initialized/locked/counts.",
    "interactivity": "Where a command would prompt (e.g. interval coverage), non-interactive invocations (piped, cron, or --json) take the interactive default action automatically rather than blocking.",
    "exit_precedence": [
      "1. usage / arg validation -> 2",
      "2. store not initialized -> 5 (NOT_INITIALIZED)",
      "3. environment / permissions / missing deps -> 6",
      "4. auth / store unlock -> 3",
      "5. model load -> 4",
      "6. data presence (no captures / too few / no coverage / unknown id) -> 5",
      "7. unexpected runtime error -> 1"
    ],
    "json_errors": "Under --json, failures emit {\"error\":{\"code\":\"STORE_LOCKED\",\"exit\":3,\"message\":\"...\"}}. Exit codes and --json structure are contractual; human prose is asserted only by stable keyword substrings.",
    "error_codes": {
      "NOT_INITIALIZED": "no store/config exists; run norm init (exit 5)",
      "STORE_LOCKED": "store present but cannot be unlocked (exit 3)",
      "NO_CAPTURES": "zero captures to process (exit 5)",
      "NOT_ENOUGH_CAPTURES": "0 < N < window_k captures; not enough for one window (exit 5)",
      "COVERAGE_MISSING": "no preprocess output covers the interval and --strict given (exit 5)",
      "UNKNOWN_ID": "requested capture id does not exist (exit 5)",
      "MODEL_UNAVAILABLE": "MLX weights unavailable offline (exit 4)",
      "INVALID_MODEL_REF": "model_ref is not a valid MLX repo id / path (exit 4)",
      "PERMISSION_MISSING": "Accessibility or Screen Recording permission not granted (exit 6)",
      "MACAPPTREE_MISSING": "capture dependency unavailable (exit 6)",
      "USAGE_ERROR": "unknown command/flag/key or invalid argument combination (exit 2)"
    },
    "flag_map": [
      {"key":"interval_minutes","flag":"--interval","commands":"record"},
      {"key":"idle_threshold_seconds","flag":"--idle-threshold","commands":"record"},
      {"key":"data_dir","flag":"--data-dir","commands":"all"},
      {"key":"phash_threshold","flag":"--phash-threshold","commands":"record"},
      {"key":"model","flag":"--model","commands":"report preprocess, report interval"},
      {"key":"window_k","flag":"--window","commands":"report preprocess"},
      {"key":"stride_j","flag":"--stride","commands":"report preprocess"},
      {"key":"max_tokens","flag":"--max-tokens","commands":"report preprocess, report interval"},
      {"key":"prompt_preprocess","flag":"--prompt-preprocess","commands":"report preprocess"},
      {"key":"prompt_interval","flag":"--prompt-interval","commands":"report interval"}
    ]
  },
  "requirements": [
    {"id":"REQ-GLOBAL-001","category":"global","title":"Version flag","command":"norm --version","preconditions":[],"pass_if":["stdout matches a semantic version string","exit_code == 0","stderr is empty"],"fail_if":["exit_code != 0","no version printed"]},
    {"id":"REQ-GLOBAL-002","category":"global","title":"Top-level help","command":"norm --help","preconditions":[],"pass_if":["stdout lists commands: init, record, report, status, list, show, export, prune, config, passwd","exit_code == 0"],"fail_if":["exit_code != 0","any documented command missing from help"]},
    {"id":"REQ-GLOBAL-003","category":"global","title":"No subcommand prints usage and fails","command":"norm","preconditions":[],"pass_if":["usage text on stderr","exit_code == 2"],"fail_if":["exit_code == 0","exit_code != 2"]},
    {"id":"REQ-GLOBAL-004","category":"global","title":"Unknown command is a usage error","command":"norm frobnicate","preconditions":[],"pass_if":["stderr names 'frobnicate' as unknown","exit_code == 2"],"fail_if":["exit_code != 2"]},
    {"id":"REQ-GLOBAL-005","category":"global","title":"Config precedence: CLI flag overrides config file","command":"norm --config ./test.norm record --once --interval 1","preconditions":["./test.norm sets interval_minutes = 9"],"pass_if":["effective interval is 1 (CLI), not 9 (config)","exit_code == 0 on a successful single capture"],"fail_if":["config value 9 is used instead of CLI value 1"]},
    {"id":"REQ-GLOBAL-006","category":"global","title":"Every config key is overridable by a per-run flag","command":"norm --model X report preprocess ; norm --data-dir D status ; norm record --once --phash-threshold 0 ; ...","preconditions":["store initialized"],"pass_if":["each config key has a canonical flag (--interval, --idle-threshold, --data-dir, --phash-threshold, --model, --window, --stride, --max-tokens, --prompt-preprocess, --prompt-interval)","for each, the flag value takes effect for that run over the ~/.norm value and the built-in default","exit_code == 0"],"fail_if":["a documented config key has no flag","a flag is silently ignored in favor of the config value or default"]},
    {"id":"REQ-GLOBAL-007","category":"global","title":"Commands on a never-initialized store fail distinctly from a locked store","command":"norm list   (no ~/.norm, no data_dir, no key)","preconditions":["nothing initialized"],"pass_if":["stderr says not initialized and suggests norm init (code NOT_INITIALIZED)","exit_code == 5","a present-but-locked store instead yields code STORE_LOCKED and exit_code == 3"],"fail_if":["absent and locked stores are conflated","exit_code == 3 for a never-initialized store"]},
    {"id":"REQ-GLOBAL-008","category":"global","title":"Failures under --json emit a structured error envelope with a stable code","command":"norm --json list   (store locked)","preconditions":["store cannot be unlocked"],"pass_if":["output contains JSON {\"error\":{\"code\":\"STORE_LOCKED\",\"exit\":3,\"message\":...}}","the code is stable and matches the documented error_codes set","exit_code == 3"],"fail_if":["error emitted only as unstructured prose under --json","code/exit mismatch"]},
    {"id":"REQ-GLOBAL-009","category":"global","title":"Time-range argument semantics","command":"norm list --last 24h --from -1h   (and variants)","preconditions":[],"pass_if":["--last combined with --from/--to is a usage error, exit_code == 2","when only --from is given, --to defaults to now","relative offsets are accepted on BOTH --from and --to, resolved against one command-start timestamp","for list and report preprocess, omitting all range flags = all captures","report interval with no range is a usage error, exit_code == 2"],"fail_if":["--last and --from/--to silently combine","relative offset rejected on --to"]},
    {"id":"REQ-GLOBAL-010","category":"global","title":"Non-interactive runs take the default action instead of prompting","command":"norm report interval --last 24h   (stdout piped; range not covered)","preconditions":["no TTY","range not fully covered"],"pass_if":["no interactive prompt is shown","the interactive default (summarize missing windows, then report) is taken automatically","exit_code == 0"],"fail_if":["the command blocks waiting for input with no TTY","it errors instead of taking the default"]},
    {"id":"REQ-ARCH-001","category":"architecture","title":"Inference is in-process; no local inference server or socket","command":"run `norm report preprocess` and `norm report interval` while monitoring sockets/processes","preconditions":["captures and model weights available"],"pass_if":["norm opens no listening socket for inference","norm makes no connection to any local or remote model-server endpoint (e.g. an mlx_vlm.server or other localhost inference port)","inference occurs via mlx-vlm load()/generate() inside the norm process"],"fail_if":["norm starts or connects to any local/remote inference server","an external daemon is required for inference"]},
    {"id":"REQ-INIT-001","category":"init","title":"init creates config, data dir, and encryption key","command":"norm init","preconditions":["~/.norm does not exist","data_dir does not exist"],"pass_if":["~/.norm created as valid TOML containing all default keys","data_dir created","an encrypted SQLCipher index exists in data_dir","a norm data key exists in the Keychain","exit_code == 0"],"fail_if":["exit_code != 0","the data key is derived from or equal to the login password","any plaintext capture/index file is written"]},
    {"id":"REQ-INIT-002","category":"init","title":"init refuses to clobber an existing store without --force","command":"norm init","preconditions":["data_dir already initialized"],"pass_if":["no existing data overwritten","stderr explains store exists and suggests --force","exit_code == 2"],"fail_if":["existing data destroyed","exit_code == 0"]},
    {"id":"REQ-INIT-003","category":"init","title":"init with passphrase wraps the data key","command":"norm init --passphrase","preconditions":["no existing store"],"pass_if":["passphrase prompted on stdin (not echoed) or read from NORM_PASSPHRASE","stored key material wrapped via Argon2id with the passphrase","exit_code == 0"],"fail_if":["passphrase echoed to terminal","passphrase stored in plaintext"]},
    {"id":"REQ-RECORD-001","category":"record","title":"record --once stores one frame when present and changed","command":"norm record --once","preconditions":["store initialized and unlockable","Accessibility and Screen Recording permissions granted","HIDIdleTime < idle_threshold","screen content differs from the last stored capture"],"pass_if":["exactly one new capture row written","row contains ts, active_app, phash, ax_hash, encrypted image_ref, encrypted ax_ref","image/AX blobs on disk are ciphertext (do not parse as PNG/JSON)","exit_code == 0"],"fail_if":["more than one row written","any blob written in plaintext","exit_code != 0"]},
    {"id":"REQ-RECORD-002","category":"record","title":"record skips capture while idle and stamps the wall-clock gap","command":"norm record --once --idle-threshold 1","preconditions":["HIDIdleTime >= 1 (idle)"],"pass_if":["no capture blob stored for the idle tick","next stored capture's idle_gap_s reflects the wall-clock idle accumulated since the previous stored capture (>= observed idle)","exit_code == 0"],"fail_if":["a capture is stored during idle","idle_gap_s not recorded"]},
    {"id":"REQ-RECORD-003","category":"record","title":"record dedupes an unchanged frame (phash + normalized-AX equality)","command":"norm record --once","preconditions":["user active","phash within threshold AND normalized ax_hash equal to last stored capture"],"pass_if":["no new capture row","prior capture duration_s extended by interval_minutes*60 seconds","exit_code == 0"],"fail_if":["duplicate blob stored","prior duration_s unchanged"]},
    {"id":"REQ-RECORD-004","category":"record","title":"record stores a new frame when only one of phash/AX changes","command":"norm record --once","preconditions":["phash within threshold but ax_hash differs (or vice versa)"],"pass_if":["a new capture row IS stored (dedupe requires BOTH)","exit_code == 0"],"fail_if":["frame incorrectly dropped as duplicate"]},
    {"id":"REQ-RECORD-005","category":"record","title":"record honors --interval in the persistent loop","command":"norm record --interval 1","preconditions":["store unlockable","permissions granted"],"pass_if":["capture attempts roughly every 1 minute (+/- slack)","runs in foreground until interrupted"],"fail_if":["interval ignored","process exits immediately without looping"]},
    {"id":"REQ-RECORD-006","category":"record","title":"record shuts down cleanly on SIGINT/SIGTERM","command":"norm record  (then SIGINT)","preconditions":["record loop running"],"pass_if":["in-flight writes flushed and store locked on signal","data key removed from process memory","exit_code == 0"],"fail_if":["store left inconsistent","exit_code != 0 on graceful stop"]},
    {"id":"REQ-RECORD-007","category":"record","title":"record fails fast without OS permissions","command":"norm record --once","preconditions":["Screen Recording OR Accessibility permission not granted"],"pass_if":["stderr names the missing permission and how to grant it","no partial capture written","exit_code == 6"],"fail_if":["exit_code != 6","a corrupt capture is written"]},
    {"id":"REQ-RECORD-008","category":"record","title":"record fails with auth error when store cannot be unlocked","command":"norm record --once","preconditions":["Keychain key absent and no/incorrect passphrase"],"pass_if":["stderr indicates store could not be unlocked","exit_code == 3"],"fail_if":["any data read or written","exit_code != 3"]},
    {"id":"REQ-RECORD-009","category":"record","title":"record daemon lifecycle via launchd","command":"norm record --install ; norm record --status ; norm record --stop","preconditions":["store initialized"],"pass_if":["--install registers a launchd user agent and starts it; exit_code == 0","--status reports running=true with a pid; exit_code == 0","--stop halts the agent; subsequent --status reports running=false; exit_code == 0"],"fail_if":["--install requires sudo/elevated privileges","--stop leaves the agent running"]},
    {"id":"REQ-REPORT-001","category":"report","title":"report with no subcommand prints usage and fails","command":"norm report","preconditions":[],"pass_if":["usage naming 'preprocess' and 'interval' on stderr","exit_code == 2"],"fail_if":["exit_code != 2"]},
    {"id":"REQ-PREPROCESS-001","category":"report.preprocess","title":"preprocess slides window K with stride J and writes one markdown per window","command":"norm report preprocess --window 6 --stride 3","preconditions":[">= 9 captures stored","model weights loadable"],"pass_if":["number of preprocess rows == floor((N - K) / J) + 1 for N stored captures (trailing remainder captures are dropped, summarized later)","each row stores markdown plus window_start, window_end, capture_ids, model, prompt_id (= sha256 prefix of the effective prompt text, persisted alongside)","markdown blobs stored encrypted","exit_code == 0"],"fail_if":["window/stride math wrong","any preprocess markdown stored in plaintext"]},
    {"id":"REQ-PREPROCESS-002","category":"report.preprocess","title":"preprocess passes BOTH images and AX text to the in-process generate() call","command":"norm report preprocess --window 2 --stride 2 --verbose","preconditions":["captures available","the generate() invocation is observable (verbose log or test seam)"],"pass_if":["generate() receives in-memory image(s) for the window AND the window's AX text","the configured prompt_preprocess is included","no network socket / HTTP request to an inference server is opened","exit_code == 0"],"fail_if":["only images sent","only AX text sent","no prompt included","inference performed over a socket/server"]},
    {"id":"REQ-PREPROCESS-003","category":"report.preprocess","title":"preprocess is idempotent on capture-set identity; --force overwrites","command":"norm report preprocess  (run twice)","preconditions":["captures unchanged between runs"],"pass_if":["a window's identity is its ordered capture_ids set; a second run skips windows whose row already exists and creates no duplicates","model and prompt_id are stored as provenance but do NOT by themselves trigger recompute","with --force, covered windows are recomputed and the existing row is overwritten (not appended)","exit_code == 0"],"fail_if":["duplicate preprocess rows accumulate on re-run without --force","changing prompt/model silently recomputes covered windows without --force"]},
    {"id":"REQ-PREPROCESS-004","category":"report.preprocess","title":"preprocess honors --from/--to capture range","command":"norm report preprocess --from -2h --to now","preconditions":["captures exist inside and outside the window"],"pass_if":["only captures within [from,to] appear in any window","exit_code == 0"],"fail_if":["captures outside the range are summarized"]},
    {"id":"REQ-PREPROCESS-005","category":"report.preprocess","title":"preprocess errors when the MLX model cannot be loaded","command":"norm report preprocess","preconditions":["model weights not cached and host offline, OR model_ref invalid"],"pass_if":["stderr distinguishes 'weights unavailable offline' from 'invalid model_ref' where possible","no partial/empty preprocess row committed","exit_code == 4"],"fail_if":["exit_code != 4","an empty markdown row is stored"]},
    {"id":"REQ-PREPROCESS-006","category":"report.preprocess","title":"preprocess errors when there are no captures","command":"norm report preprocess","preconditions":["store contains zero captures"],"pass_if":["stderr states there are no captures to process (code NO_CAPTURES)","exit_code == 5"],"fail_if":["exit_code == 0","an empty report is produced"]},
    {"id":"REQ-PREPROCESS-007","category":"report.preprocess","title":"preprocess errors when there are fewer captures than one window","command":"norm report preprocess --window 6 --stride 3","preconditions":["0 < N < window_k captures stored"],"pass_if":["stderr distinguishes 'not enough captures' from 'no captures' (code NOT_ENOUGH_CAPTURES)","no preprocess row written","exit_code == 5"],"fail_if":["a partial window is summarized","exit_code == 0"]},
    {"id":"REQ-INTERVAL-001","category":"report.interval","title":"interval aggregates preprocess markdown over [from,to], emits and stores it","command":"norm report interval --from -24h --to now","preconditions":["preprocess rows cover the interval","model loadable"],"pass_if":["generate() receives the preprocess markdown summaries within the interval plus prompt_interval","aggregated markdown emitted to stdout by default","an encrypted interval_report row is persisted (generated_at, range_from/to, model, prompt_id, source_preprocess_ids, markdown_ref); re-running appends a new row","exit_code == 0"],"fail_if":["raw captures summarized instead of preprocess output","no interval_report row stored","exit_code != 0"]},
    {"id":"REQ-INTERVAL-002","category":"report.interval","title":"interval requires a time range","command":"norm report interval","preconditions":[],"pass_if":["stderr says --from/--to (or --last) is required","exit_code == 2"],"fail_if":["a report is produced over an unbounded range","exit_code == 0"]},
    {"id":"REQ-INTERVAL-003","category":"report.interval","title":"interval handles an uncovered range: prompt (interactive), auto (non-interactive), or --strict error","command":"norm report interval --last 24h [--strict]","preconditions":["captures exist but report preprocess does not cover the range"],"pass_if":["non-interactive (piped/cron/--json): missing windows are summarized first, then the report is produced; exit_code == 0","interactive (TTY): user is prompted, default = summarize first","with --strict: no work done, stderr explains coverage missing (code COVERAGE_MISSING), exit_code == 5"],"fail_if":["a misleading empty/partial summary is produced silently","--strict still performs preprocessing or returns exit 0"]},
    {"id":"REQ-INTERVAL-004","category":"report.interval","title":"interval --auto-preprocess summarizes missing windows without prompting","command":"norm report interval --last 24h --auto-preprocess","preconditions":["captures exist but no preprocess output for the range","model loadable"],"pass_if":["missing preprocess windows computed with no prompt, then interval report produced and stored","exit_code == 0"],"fail_if":["interval prompts or fails with exit_code 5 despite --auto-preprocess"]},
    {"id":"REQ-INTERVAL-005","category":"report.interval","title":"interval --output writes a plaintext file (and still stores the encrypted row)","command":"norm report interval --last 7d --output ./week.md","preconditions":["preprocess output covers the range"],"pass_if":["./week.md created with aggregated markdown (plaintext, user-requested)","an encrypted interval_report row is still persisted in the store","stdout quiet or prints only the path","exit_code == 0"],"fail_if":["file not created","markdown dumped to stdout despite --output"]},
    {"id":"REQ-DATA-001","category":"data","title":"status reports store and daemon state without decrypting blobs, and never fails","command":"norm status","preconditions":[],"pass_if":["stdout shows initialized (bool), locked/unlocked, data_dir, capture count, last capture ts, preprocess count, interval-report count, daemon state","counts come from the encrypted index, not from decrypting blobs","on a never-initialized machine it reports initialized=false and still exit_code == 0","exit_code == 0"],"fail_if":["status decrypts blob payloads to produce counts","status exits non-zero on an uninitialized or locked store"]},
    {"id":"REQ-DATA-002","category":"data","title":"list shows captures in a range; --json is machine-readable","command":"norm list --from -6h --to now --json","preconditions":["store unlockable","captures in range"],"pass_if":["with --json, stdout is a valid JSON array of capture metadata (id, ts, active_app, idle_gap_s, duration_s)","without --json, output is a human table","exit_code == 0"],"fail_if":["--json emits non-JSON","captures outside the range listed"]},
    {"id":"REQ-DATA-003","category":"data","title":"show returns one capture's metadata and can export its artifacts","command":"norm show <id> --export ./out","preconditions":["store unlockable","<id> exists"],"pass_if":["metadata for <id> printed","with --export, decrypted PNG and AX JSON written under ./out","exit_code == 0"],"fail_if":["a non-existent id returns exit_code 0"]},
    {"id":"REQ-DATA-004","category":"data","title":"show errors on unknown id","command":"norm show 99999999","preconditions":["store unlockable","id does not exist"],"pass_if":["stderr indicates id not found","exit_code == 5"],"fail_if":["exit_code != 5"]},
    {"id":"REQ-DATA-005","category":"data","title":"export decrypts a range to a directory; --include defaults to all types","command":"norm export --from -1d --to now --out ./dump [--include images,ax,reports]","preconditions":["store unlockable","data exists in range"],"pass_if":["omitting --include exports all available types (images,ax,reports)","reports covers BOTH stored preprocess summaries and stored interval reports","files written as ./out/images/<id>.png, ./out/ax/<id>.ax.json, ./out/reports/preprocess/<window_id>.md, ./out/reports/interval/<report_id>.md","exit_code == 0"],"fail_if":["export succeeds while store locked","exit_code == 0 when store could not be unlocked"]},
    {"id":"REQ-DATA-006","category":"data","title":"prune deletes captures in a range; summaries/reports retained unless --include reports","command":"norm prune --before -30d [--dry-run] [--include reports]","preconditions":["store unlockable","captures older than 30d exist"],"pass_if":["default: captures with ts<cutoff and their image/AX blobs are removed atomically (no orphans); preprocess and interval_report rows are RETAINED even if they now reference deleted captures; exit_code == 0","--dry-run reports the counts that would be removed and deletes nothing; exit_code == 0","--include reports additionally removes preprocess rows (window_end<cutoff) and interval_report rows (to<cutoff) plus their markdown blobs; exit_code == 0"],"fail_if":["--dry-run deletes data","blobs orphaned (removed from index but left on disk, or vice versa)","summaries/reports deleted without --include reports"]},
    {"id":"REQ-CONFIG-001","category":"config","title":"config get/set/path round-trips through ~/.norm","command":"norm config set interval_minutes 10 ; norm config get interval_minutes ; norm config path","preconditions":["~/.norm exists"],"pass_if":["set writes interval_minutes=10 to ~/.norm as valid TOML","get prints 10","path prints the absolute path to ~/.norm","exit_code == 0 for each"],"fail_if":["set corrupts the TOML","get reflects a stale value"]},
    {"id":"REQ-CONFIG-002","category":"config","title":"config rejects unknown keys","command":"norm config set bogus_key 1","preconditions":[],"pass_if":["stderr names the unknown key","~/.norm unchanged","exit_code == 2"],"fail_if":["unknown key written to config","exit_code == 0"]},
    {"id":"REQ-CONFIG-003","category":"config","title":"Prompts are configurable and used when a window is (re)computed","command":"norm config set prompt_preprocess 'Summarize the active task in one line.' ; norm report preprocess --force","preconditions":["captures available","model loadable"],"pass_if":["a newly computed window (fresh capture set, or any window under --force) passes the new prompt text to generate() and records its prompt_id","exit_code == 0"],"fail_if":["the default/old prompt is used when a window is actually computed","already-covered windows are silently recomputed by a plain re-run (without --force) just because the prompt changed"]},
    {"id":"REQ-CONFIG-004","category":"config","title":"model config (or --model) selects the MLX model_ref used by mlx-vlm","command":"norm config set model mlx-community/gemma-4-31b-it-4bit   (or --model ...)","preconditions":["target weights loadable"],"pass_if":["a report that computes a window loads the configured model_ref via mlx-vlm load() and records it as provenance","--model overrides the config value for that run","exit_code == 0"],"fail_if":["the default model_ref is loaded instead of the configured/flagged one"]},
    {"id":"REQ-SEC-001","category":"security","title":"All on-disk capture data is ciphertext","command":"inspect data_dir blob and index files directly (no norm involved)","preconditions":["at least one capture stored"],"pass_if":["image blobs do not parse as PNG/JPEG","AX blobs do not parse as JSON","the index file is not a readable plaintext SQLite database"],"fail_if":["any capture image, AX dump, or index row readable without the key"]},
    {"id":"REQ-SEC-002","category":"security","title":"Login password is never read or held","command":"audit any norm command's behavior/memory","preconditions":[],"pass_if":["norm never prompts for, reads, or stores the macOS login password","the data key is a norm-specific Keychain item and/or passphrase-derived value, distinct from the login password"],"fail_if":["the login password appears in norm's process memory, logs, or stored files"]},
    {"id":"REQ-SEC-003","category":"security","title":"No elevated privileges required for any command","command":"run init, record, report, and all data commands as a normal user","preconditions":["no sudo invocation"],"pass_if":["every command completes (or fails for its documented reason) without sudo/root","no setuid helper or privileged daemon installed"],"fail_if":["any command requires sudo to function","a root-owned helper is installed"]},

    {"id":"REQ-SEC-005","category":"security","title":"passwd rotates the passphrase via key re-wrapping","command":"norm passwd","preconditions":["store unlockable with the old passphrase"],"pass_if":["old passphrase verified before change","the data-key wrapping is re-derived with the new passphrase (key-wrapping, not bulk blob re-encryption unless explicitly requested)","after change, old passphrase fails (exit 3) and new passphrase unlocks (exit 0)"],"fail_if":["the data key is exposed in plaintext on disk during rotation","old passphrase still unlocks after a successful change"]},
    {"id":"REQ-SEC-006","category":"security","title":"Report-time decryption is transient and in-memory","command":"run report preprocess/interval while monitoring data_dir and temp paths","preconditions":["encrypted captures exist","model loadable"],"pass_if":["decrypted images are passed to generate() as in-memory PIL objects","no plaintext image or AX dump is written to disk during inference","any transient buffers are released after the call"],"fail_if":["a plaintext image/AX file is written to disk (temp or otherwise) during reporting"]},
    {"id":"REQ-ENV-001","category":"environment","title":"Missing macapptree / capture dependency is an environment error","command":"norm record --once","preconditions":["macapptree or its native capture dependency unavailable"],"pass_if":["stderr names the missing dependency","exit_code == 6"],"fail_if":["exit_code == 1 (generic) instead of 6","a silent no-op capture is recorded"]}

// ── helpers ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function el(tag, cls, html) {
  const d = document.createElement(tag);
  if (cls) d.className = cls;
  if (html !== undefined) d.innerHTML = html;
  return d;
}

function listEl(items, itemClass) {
  if (!items || !items.length) return null;
  const ul = document.createElement('ul');
  items.forEach(t => {
    const li = document.createElement('li');
    li.className = itemClass || '';
    li.textContent = t;
    ul.appendChild(li);
  });
  return ul;
}

// ── meta banner ───────────────────────────────────────────────────────────────

function renderMeta() {
  document.getElementById('meta-banner').innerHTML =
    `<code>${esc(DATA.tool)}</code> · spec&nbsp;v${esc(DATA.spec_version)} · ${esc(DATA.platform)}<br>
     <span style="color:var(--muted)">${esc(DATA.description)}</span>`;
}

// ── conventions ───────────────────────────────────────────────────────────────

function renderConventions() {
  const C = DATA.conventions;
  const sec = document.getElementById('conventions');
  sec.innerHTML = '<h2>Conventions</h2>';

  // prerequisites
  const pre = el('div','conv-card');
  pre.innerHTML = '<h3>Prerequisites</h3>';
  pre.appendChild(listEl(C.prerequisites));
  // global flags
  const gf = el('div','conv-card');
  gf.innerHTML = '<h3>Global flags</h3>';
  gf.appendChild(listEl(C.global_flags));

  const row1 = el('div','conv-grid');
  row1.appendChild(pre); row1.appendChild(gf);
  sec.appendChild(row1);

  // exit codes
  const ec = el('div','conv-card');
  ec.innerHTML = '<h3>Exit codes</h3>';
  const tbl = document.createElement('table');
  tbl.className = 'exit-table';
  Object.entries(C.exit_codes).forEach(([code, desc]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><code>${esc(code)}</code></td><td>${esc(desc)}</td>`;
    tbl.appendChild(tr);
  });
  ec.appendChild(tbl);

  // time args
  const ta = el('div','conv-card');
  ta.innerHTML = '<h3>Time arguments</h3>';
  const taDl = el('dl','conv-dl');
  Object.entries(C.time_args).forEach(([k,v]) => {
    taDl.innerHTML += `<dt><code>--${esc(k)}</code></dt><dd>${esc(v)}</dd>`;
  });
  ta.appendChild(taDl);

  const row2 = el('div','conv-grid');
  row2.appendChild(ec); row2.appendChild(ta);
  sec.appendChild(row2);

  // config
  const cfg = el('div','conv-card');
  cfg.innerHTML = `<h3>Config (<code>${esc(C.config.path)}</code>)</h3>
    <dl class="conv-dl">
      <dt>Format</dt><dd>${esc(C.config.format)}</dd>
      <dt>Precedence</dt><dd>${esc(C.config.precedence)}</dd>
      <dt>Keys</dt><dd>${C.config.keys.map(k=>`<code>${esc(k)}</code>`).join(', ')}</dd>
    </dl>`;

  // defaults
  const def = el('div','conv-card');
  def.innerHTML = '<h3>Defaults</h3>';
  const defTbl = document.createElement('table');
  defTbl.style.fontSize = '.82rem';
  Object.entries(C.defaults).forEach(([k,v]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><code>${esc(k)}</code></td><td>${esc(v)}</td>`;
    defTbl.appendChild(tr);
  });
  def.appendChild(defTbl);

  const row3 = el('div','conv-grid');
  row3.appendChild(cfg); row3.appendChild(def);
  sec.appendChild(row3);

  // inference + encryption
  const inf = el('div','conv-card');
  inf.innerHTML = '<h3>Inference</h3>';
  const infDl = el('dl','conv-dl');
  Object.entries(C.inference).forEach(([k,v]) => {
    infDl.innerHTML += `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`;
  });
  inf.appendChild(infDl);

  const enc = el('div','conv-card');
  enc.innerHTML = '<h3>Encryption</h3>';
  const encDl = el('dl','conv-dl');
  Object.entries(C.encryption).forEach(([k,v]) => {
    encDl.innerHTML += `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`;
  });
  enc.appendChild(encDl);

  const row4 = el('div','conv-grid');
  row4.appendChild(inf); row4.appendChild(enc);
  sec.appendChild(row4);

  // error codes + failure precedence
  if (C.error_codes) {
    const er = el('div','conv-card');
    er.innerHTML = '<h3>Error codes (stable; surfaced under <code>--json</code>)</h3>';
    const erTbl = document.createElement('table');
    erTbl.style.fontSize = '.78rem';
    Object.entries(C.error_codes).forEach(([k,v]) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><code>${esc(k)}</code></td><td>${esc(v)}</td>`;
      erTbl.appendChild(tr);
    });
    er.appendChild(erTbl);

    const pr = el('div','conv-card');
    pr.innerHTML = '<h3>Failure precedence (first wins)</h3>';
    pr.appendChild(listEl(C.exit_precedence));
    if (C.json_errors) pr.innerHTML += `<p style="font-size:.84rem;color:var(--muted);margin-top:.5rem">${esc(C.json_errors)}</p>`;
    if (C.uninitialized) pr.innerHTML += `<p style="font-size:.84rem;color:var(--muted);margin-top:.4rem"><strong>Uninitialized vs locked:</strong> ${esc(C.uninitialized)}</p>`;
    if (C.interactivity) pr.innerHTML += `<p style="font-size:.84rem;color:var(--muted);margin-top:.4rem"><strong>Interactivity:</strong> ${esc(C.interactivity)}</p>`;

    const row5 = el('div','conv-grid');
    row5.appendChild(er); row5.appendChild(pr);
    sec.appendChild(row5);
  }

  // flag <-> config map
  if (C.flag_map) {
    const fm = el('div','conv-card');
    fm.innerHTML = '<h3>Flag &harr; config map <span style="font-weight:400;color:var(--muted)">(every key: CLI flag &gt; ~/.norm &gt; default)</span></h3>';
    const fmTbl = document.createElement('table');
    fmTbl.style.fontSize = '.8rem';
    fmTbl.innerHTML = '<tr><th>Config key</th><th>CLI flag</th><th>Commands</th></tr>';
    C.flag_map.forEach(m => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><code>${esc(m.key)}</code></td><td><code>${esc(m.flag)}</code></td><td>${esc(m.commands)}</td>`;
      fmTbl.appendChild(tr);
    });
    fm.appendChild(fmTbl);
    sec.appendChild(fm);
  }
}

// ── requirements ──────────────────────────────────────────────────────────────

const CATS = [...new Set(DATA.requirements.map(r => r.category))];
let activeCat = null;

function renderCatNav() {
  const nav = document.getElementById('cat-nav');
  const all = document.createElement('button');
  all.className = 'cat-btn active'; all.textContent = 'All';
  all.addEventListener('click', () => setFilter(null, all));
  nav.appendChild(all);

  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat;
    btn.addEventListener('click', () => setFilter(cat, btn));
    nav.appendChild(btn);
  });
}

function setFilter(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.req-group').forEach(g => {
    if (!cat || g.dataset.cat === cat) {
      g.classList.remove('hidden');
    } else {
      g.classList.add('hidden');
    }
  });
}

function renderRequirements() {
  const list = document.getElementById('req-list');
  const bycat = {};
  DATA.requirements.forEach(r => {
    (bycat[r.category] = bycat[r.category] || []).push(r);
  });

  CATS.forEach(cat => {
    const group = el('div','req-group');
    group.dataset.cat = cat;

    const heading = el('div','req-group-heading');
    heading.textContent = cat.toUpperCase();
    group.appendChild(heading);

    bycat[cat].forEach(req => {
      const card = el('div','req-card');

      // header
      const hdr = el('div','req-card-header');
      hdr.innerHTML = `<span class="req-id">${esc(req.id)}</span>
                       <span class="req-title">${esc(req.title)}</span>`;
      card.appendChild(hdr);

      // command
      const cmd = el('div','req-command');
      cmd.textContent = req.command;
      card.appendChild(cmd);

      // body sections
      const body = el('div','req-sections');

      if (req.preconditions && req.preconditions.length) {
        const s = el('div','req-section');
        s.innerHTML = '<div class="req-section-label label-pre">Before</div>';
        s.appendChild(listEl(req.preconditions));
        body.appendChild(s);
      }

      if (req.pass_if && req.pass_if.length) {
        const s = el('div','req-section');
        s.innerHTML = '<div class="req-section-label label-pass">✓ Pass if</div>';
        s.appendChild(listEl(req.pass_if, 'pass-item'));
        body.appendChild(s);
      }

      if (req.fail_if && req.fail_if.length) {
        const s = el('div','req-section');
        s.innerHTML = '<div class="req-section-label label-fail">✗ Fail if</div>';
        s.appendChild(listEl(req.fail_if, 'fail-item'));
        body.appendChild(s);
      }

      card.appendChild(body);
      group.appendChild(card);
    });

    list.appendChild(group);
  });
}

// ── boot ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  renderMeta();
  renderConventions();
  renderCatNav();
  renderRequirements();
});
</script>
